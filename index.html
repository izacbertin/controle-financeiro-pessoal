<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Controle Financeiro Pessoal</title>
  <meta name="description" content="Controle financeiro pessoal — painel, gastos, receitas e notas fiscais, 100% local." />
  <!--
    ?v=NN nos arquivos abaixo = "cache-busting": a cada mudança publicada
    incrementamos esse número, e o navegador (incl. Safari do iPhone) é
    obrigado a baixar a versão nova em vez de usar a antiga em cache.
    >>> Ao publicar uma atualização, suba o número em TODAS as linhas. <<<
  -->
  <link rel="stylesheet" href="css/styles.css?v=10" />
</head>
<body>
  <div id="app-shell"></div>

  <div id="modal-root" class="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <input type="file" id="import-file-input" accept="application/json" hidden />

  <!-- Ordem importa: cada arquivo assume que os anteriores já rodaram. -->
  <script src="js/utils.js?v=10"></script>
  <script src="js/storage.js?v=10"></script>
  <script src="js/state.js?v=10"></script>
  <script src="js/charts.js?v=10"></script>
  <script src="js/components/icons.js?v=10"></script>
  <script src="js/components/modal.js?v=10"></script>
  <script src="js/components/toast.js?v=10"></script>
  <script src="js/components/animate.js?v=10"></script>
  <script src="js/views/dashboard.js?v=10"></script>
  <script src="js/views/gastos.js?v=10"></script>
  <script src="js/views/receitas.js?v=10"></script>
  <script src="js/views/nfs.js?v=10"></script>
  <script src="js/app.js?v=10"></script>
</body>
</html>
